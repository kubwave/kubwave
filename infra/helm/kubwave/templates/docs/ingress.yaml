{{- $docs := .Values.docs | default dict -}}
{{- $docsIngress := $docs.ingress | default dict -}}
{{- if and $docs.enabled $docsIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "docs") | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - host: {{ required "docs.ingress.host is required" $docsIngress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: {{ $docs.port }}
{{- end }}
