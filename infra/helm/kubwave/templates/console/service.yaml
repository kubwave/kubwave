apiVersion: v1
kind: Service
metadata:
  name: console
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "console") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kubwave.selectorLabels" (dict "component" "console") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.console.port }}
      targetPort: http
