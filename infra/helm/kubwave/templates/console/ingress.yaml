apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: console
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "console") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required "ingress.host required when TLS enabled" .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    # Same-origin routing on one host: /api → api, everything else → console.
    # The /api rule MUST come first so it wins over the catch-all / prefix.
    - host: {{ required "ingress.host is required" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: {{ .Values.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: console
                port:
                  number: {{ .Values.console.port }}
