{{- $apiSecret := include "kubwave.secretName" (dict "secret" .Values.api.secret) -}}
{{- $pgSecret  := include "kubwave.secretName" (dict "secret" .Values.postgres.secret) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "api") | nindent 4 }}
spec:
  replicas: {{ include "kubwave.replicas" (dict "root" $ "fallback" .Values.api.replicas) }}
  selector:
    matchLabels:
      {{- include "kubwave.selectorLabels" (dict "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubwave.labels" (dict "root" $ "component" "api") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.api.serviceAccount.create }}
      serviceAccountName: {{ .Values.api.serviceAccount.name }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if (.Values.ha | default dict).enabled }}
      {{- include "kubwave.haSpread" (dict "root" $ "component" "api") | nindent 6 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ required "api.image.repository is required" .Values.api.image.repository }}:{{ required "api.image.tag is required" .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: BACKEND_ENTRYPOINT
              value: api
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecret }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecret }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ $pgSecret }}
                  key: POSTGRES_DB
            {{- with .Values.api.databaseUrl }}
            - name: DATABASE_URL
              value: {{ . | quote }}
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $apiSecret }}
                  key: JWT_SECRET
            # Encrypts user-service secrets at rest (the worker reads the same key to decrypt).
            - name: SECRETS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $apiSecret }}
                  key: SECRETS_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $apiSecret }}
                  key: GITHUB_TOKEN
                  optional: true
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Version from the running image — pod-local so the display follows the
            # actually-serving pod during a rolling update.
            - name: APP_VERSION
              value: {{ .Values.api.image.tag | quote }}
            # Trust the in-cluster API server's self-signed CA for Kubernetes client calls.
            # The SA CA mount is always present on pods with automountServiceAccountToken.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - name: API_PORT
              value: {{ .Values.api.port | quote }}
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: {{ .Values.api.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.api.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
