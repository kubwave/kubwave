apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kubwave.selectorLabels" (dict "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
