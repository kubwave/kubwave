{{- $mailcrab := .Values.mailcrab | default dict -}}
{{- $ingress := $mailcrab.ingress | default dict -}}
{{- if and $mailcrab.enabled $ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mailcrab
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "mailcrab") | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - host: {{ required "mailcrab.ingress.host is required" $ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mailcrab
                port:
                  number: {{ $mailcrab.httpPort }}
{{- end }}
