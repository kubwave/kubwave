{{- if .Values.builds.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.builds.serviceAccount.name }}
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "builder") | nindent 4 }}
# BuildKit talks only to the registry over the network — it needs no Kubernetes API access, so this
# SA has no Role/RoleBinding and the build pod disables token automounting.
automountServiceAccountToken: false
{{- end }}
