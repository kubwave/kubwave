{{- if and (eq .Values.postgres.mode "cnpg") .Values.postgres.secret.create (not .Values.postgres.secret.existingSecret) }}
{{- /*
Chart-managed basic-auth Secret consumed by CNPG initdb (Cluster.spec.bootstrap.initdb.secret).
Derived from postgres.secret.data so its password matches postgres-creds — api/worker read
POSTGRES_USER/PASSWORD from postgres-creds and authenticate as that role via postgres-rw, so the
two MUST agree. In prod (postgres.secret.create=false) the CLI creates this alongside
postgres-creds with the same generated password.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.bootstrap.credentialsSecret }}
  labels:
    {{- include "kubwave.labels" (dict "root" $ "component" "postgres") | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.secret.data.POSTGRES_USER | quote }}
  password: {{ .Values.postgres.secret.data.POSTGRES_PASSWORD | quote }}
{{- end }}
