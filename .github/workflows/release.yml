name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14
  HELM_VERSION: 3.16.4
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: kubwave

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      latest: ${{ steps.version.outputs.latest }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.version || github.ref_name }}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release versions must look like 1.2.3 or 1.2.3-preview.1 and must not use a v prefix: $version" >&2
            exit 1
          fi
          if [[ "$version" == *-* ]]; then
            echo "latest=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check-types

      - name: Test
        run: bun run test
        env:
          # Unit tests mock the data layer; @kubwave/db builds a lazy client at import
          # time and only needs a syntactically valid URL — no real database is contacted.
          DATABASE_URL: postgres://test:test@127.0.0.1:5432/test

      - name: Build
        run: bun run build

  build-cli:
    name: Build CLI assets
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package chart
        working-directory: apps/cli
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p build/embedded /tmp/kubwave-chart
          curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm-linux-amd64.tgz
          tar xzf /tmp/helm-linux-amd64.tgz -C /tmp
          /tmp/linux-amd64/helm package ../../infra/helm/kubwave \
            --version "${RELEASE_VERSION}" \
            --app-version "${RELEASE_VERSION}" \
            --destination /tmp/kubwave-chart
          cp "/tmp/kubwave-chart/kubwave-${RELEASE_VERSION}.tgz" build/embedded/chart.tgz
          /tmp/linux-amd64/helm show chart build/embedded/chart.tgz | tee /tmp/embedded-chart.yaml
          grep -Fx "version: ${RELEASE_VERSION}" /tmp/embedded-chart.yaml
          grep -Fx "appVersion: ${RELEASE_VERSION}" /tmp/embedded-chart.yaml

      - name: Build platform binaries
        working-directory: apps/cli
        env:
          KUBWAVE_VERSION: ${{ needs.resolve-version.outputs.version }}
          KUBWAVE_HELM_VERSION: ${{ env.HELM_VERSION }}
        run: |
          set -euo pipefail

          embed_helm() {
            local os="$1"
            local arch="$2"
            local dir="${os}-${arch}"
            curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-${dir}.tar.gz" -o "/tmp/helm-${dir}.tgz"
            rm -rf "/tmp/${dir}"
            tar xzf "/tmp/helm-${dir}.tgz" -C /tmp
            install -m 0755 "/tmp/${dir}/helm" build/embedded/helm
          }

          embed_helm linux amd64
          bun run build:linux-x64

          embed_helm linux arm64
          bun run build:linux-arm64

          embed_helm darwin amd64
          bun run build:darwin-x64

          embed_helm darwin arm64
          bun run build:darwin-arm64

      - name: Verify release asset versions
        working-directory: apps/cli
        run: |
          dist/kubwave-linux-x64 version | grep "${{ needs.resolve-version.outputs.version }}"

      - name: Restore Linux Helm for artifact cache
        working-directory: apps/cli
        run: |
          curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tgz
          rm -rf /tmp/linux-amd64
          tar xzf /tmp/helm.tgz -C /tmp
          install -m 0755 /tmp/linux-amd64/helm build/embedded/helm

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-assets
          path: |
            apps/cli/dist/kubwave-linux-x64
            apps/cli/dist/kubwave-linux-arm64
            apps/cli/dist/kubwave-darwin-x64
            apps/cli/dist/kubwave-darwin-arm64
          if-no-files-found: error
          retention-days: 1

  build-images:
    name: Build images
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - verify
    # Suppress the *.dockerbuild build-record artifact; pushed images and logs are
    # enough for release debugging, and these UI-only artifacts can add storage cost.
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            context: .
            file: apps/backend/Dockerfile
          - app: console
            context: .
            file: apps/console/Dockerfile
          - app: build-tools
            context: .
            file: apps/build-tools/Dockerfile
          - app: cli
            context: .
            file: apps/cli/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image tarball
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: prod
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}:${{ needs.resolve-version.outputs.version }}
          build-args: |
            KUBWAVE_VERSION=${{ needs.resolve-version.outputs.version }}
            HELM_VERSION=${{ env.HELM_VERSION }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.app }}.tar
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Upload image tarball
        uses: actions/upload-artifact@v7
        with:
          name: image-${{ matrix.app }}
          path: /tmp/image-${{ matrix.app }}.tar
          if-no-files-found: error
          retention-days: 1

  build-chart:
    name: Build chart
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - verify
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v${{ env.HELM_VERSION }}

      - name: Package chart
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          helm package infra/helm/kubwave \
            --version "${RELEASE_VERSION}" \
            --app-version "${RELEASE_VERSION}" \
            --destination .
          helm show chart "kubwave-${RELEASE_VERSION}.tgz" | tee /tmp/chart.yaml
          grep -Fx "version: ${RELEASE_VERSION}" /tmp/chart.yaml
          grep -Fx "appVersion: ${RELEASE_VERSION}" /tmp/chart.yaml

      - name: Upload chart tarball
        uses: actions/upload-artifact@v7
        with:
          name: chart-tarball
          path: kubwave-${{ needs.resolve-version.outputs.version }}.tgz
          if-no-files-found: error
          retention-days: 1

  verify-install:
    name: Verify install
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-images
      - build-chart
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          merge-multiple: false

      - name: Stage images + chart
        run: |
          set -euo pipefail
          mkdir -p /tmp/images
          cp /tmp/artifacts/image-*/*.tar /tmp/images/
          cp /tmp/artifacts/chart-tarball/*.tgz .

      - name: Verify install + self-update
        uses: ./.github/actions/verify-install
        with:
          version: ${{ needs.resolve-version.outputs.version }}
          image-prefix: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
          helm-version: ${{ env.HELM_VERSION }}
          kind-version: v0.31.0
          kind-node-image: kindest/node:v1.31.0
          kubectl-version: v1.31.0

  publish-images:
    name: Publish images
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - verify-install
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
          - app: console
          - app: build-tools
          - app: cli
    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v8
        with:
          name: image-${{ matrix.app }}
          path: /tmp/image-${{ matrix.app }}

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push verified image
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          PUBLISH_LATEST: ${{ needs.resolve-version.outputs.latest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.app }}
        run: |
          set -euo pipefail
          docker load -i "/tmp/image-${{ matrix.app }}/image-${{ matrix.app }}.tar"
          docker push "${IMAGE}:${VERSION}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            docker tag "${IMAGE}:${VERSION}" "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-cli
      - publish-images
    permissions:
      actions: write
      contents: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: cli-assets
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          prerelease: ${{ needs.resolve-version.outputs.prerelease }}
          generate_release_notes: true
          files: dist/kubwave-*

      - name: Delete temporary artifacts
        uses: actions/github-script@v9
        with:
          script: |
            const temporaryArtifactNames = new Set([
              'cli-assets',
              'image-backend',
              'image-console',
              'image-cli',
              'chart-tarball',
            ]);

            try {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });

              for (const artifact of artifacts) {
                if (!temporaryArtifactNames.has(artifact.name)) {
                  continue;
                }

                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                core.info(`Deleted ${artifact.name} artifact ${artifact.id}.`);
              }
            } catch (error) {
              core.warning(`Could not delete temporary artifacts: ${error.message}`);
            }
