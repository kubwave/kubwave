# Deploys a throwaway preview Worker (kubwave-docs-pr-<N>) for each PR and posts
# its *.workers.dev URL as a comment. A real deploy is used (not `versions upload`)
# because version preview URLs do not serve static assets for an assets-only Worker.
# Production (docs.kubwave.com) is only published by release.yml on a stable release.
# The preview Worker is torn down by docs-preview-cleanup.yml when the PR closes.
name: Docs preview

on:
  pull_request:
    paths:
      - apps/docs/**

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    # Forks don't receive secrets, so a Cloudflare preview can't be produced there.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run --filter=docs build

      # Deploy under a per-PR worker name using the `preview` environment, which
      # enables a *.workers.dev URL. This never touches docs.kubwave.com.
      - name: Deploy preview worker
        id: deploy
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          bunx wrangler deploy --env preview --name "kubwave-docs-pr-${PR}" 2>&1 | tee /tmp/wrangler-deploy.log
          url="$(grep -oE 'https://kubwave-docs-pr-[0-9]+\.[a-z0-9.-]+\.workers\.dev' /tmp/wrangler-deploy.log | head -1 || true)"
          if [ -z "$url" ]; then
            echo "Could not parse the preview URL from wrangler output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- docs-preview -->';
            const footer =
              '_Updated on every push; torn down when the PR closes. Production (docs.kubwave.com) is only deployed on release._';
            const body = `${marker}\n📖 **Docs preview:** ${url}\n\n${footer}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
