name: Docs preview

on:
  pull_request:
    paths:
      - apps/docs/**

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    # Forks don't receive secrets, so a Cloudflare preview can't be produced there.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run --filter=docs build

      # `versions upload` publishes a non-production version and prints a preview URL;
      # it never touches docs.kubwave.com (that only moves on `wrangler deploy` at release).
      - name: Upload preview version
        id: upload
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bunx wrangler versions upload | tee /tmp/wrangler-upload.log
          url="$(grep -oE 'https://[a-z0-9-]+\.workers\.dev' /tmp/wrangler-upload.log | head -1)"
          if [ -z "$url" ]; then
            echo "Could not parse a preview URL from wrangler output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const url = '${{ steps.upload.outputs.url }}';
            const marker = '<!-- docs-preview -->';
            const body = `${marker}\n📖 **Docs-Preview:** ${url}\n\n_Aktualisiert bei jedem Push. Production (docs.kubwave.com) wird nur beim Release deployed._`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
